<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Card Graphics · Creative Waco Tools</title>
    <link rel="stylesheet" href="/shared.css" />
    <link rel="stylesheet" href="/event-cards/styles.css" />
  </head>
  <body>
    <main class="page">
      <nav class="tool-nav"><a href="/">← All tools</a></nav>

      <header class="hero">
        <p class="eyebrow">Creative Waco tooling</p>
        <h1>Event Card Graphics</h1>
        <p class="lede">
          Build clean 4:5 portrait cards from the events RSS feed — event photo and title
          only. Download PNGs for social posts.
        </p>
      </header>

      <div class="layout">
        <section class="panel controls">
          <form id="cards-form" class="form">
            <label class="field">
              <span>RSS feed URL</span>
              <input
                id="feed-url"
                name="feedUrl"
                type="url"
                required
                value="https://creativewaco.org/event/rss.xml"
              />
            </label>

            <div class="field-grid">
              <label class="field">
                <span>How many cards</span>
                <input id="limit" name="limit" type="number" min="1" max="30" value="8" />
              </label>

              <label class="field">
                <span>Card width (px)</span>
                <select id="card-width" name="cardWidth">
                  <option value="320">320 (4:5 → 400 tall)</option>
                  <option value="360" selected>360 (4:5 → 450 tall)</option>
                  <option value="400">400 (4:5 → 500 tall)</option>
                  <option value="540">540 (4:5 → 675 tall)</option>
                </select>
              </label>
            </div>

            <label class="field">
              <span>Sort by</span>
              <select id="sort" name="sort">
                <option value="date-asc" selected>Upcoming date (soonest first)</option>
                <option value="date-desc">Date (latest first)</option>
                <option value="title">Title (A–Z)</option>
                <option value="pub-desc">RSS feed order</option>
              </select>
            </label>

            <label class="field checkbox">
              <input id="upcoming-only" name="upcomingOnly" type="checkbox" checked />
              <span>Only upcoming events (from today)</span>
            </label>

            <label class="field checkbox">
              <input id="enrich" name="enrich" type="checkbox" checked />
              <span>Enrich from event pages (better images &amp; dates)</span>
            </label>

            <button class="primary" type="submit" id="generate-btn">Generate cards</button>
          </form>

          <p id="status" class="status" aria-live="polite"></p>
        </section>

        <section class="panel output">
          <div class="output-header">
            <h2>Preview</h2>
            <div class="output-actions">
              <button type="button" id="download-all" class="secondary" disabled>
                Download all PNG
              </button>
              <button type="button" id="copy-html" class="secondary" disabled>Copy HTML</button>
            </div>
          </div>
          <div id="preview" class="preview-area">
            <p class="placeholder">Generated cards will appear here.</p>
          </div>
        </section>
      </div>
    </main>

    <script src="/event-cards/app.js" type="module"></script>
  </body>
</html>
